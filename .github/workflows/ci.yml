name: CI

on:
  push:
    branches:
      - main
      - "claude/*"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_sdr_test
          POSTGRES_USER: ai_sdr
          POSTGRES_PASSWORD: ai_sdr
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev,ui]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ai_sdr/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests with coverage
        run: pytest --cov=ai_sdr --cov-report=xml --cov-report=term-missing tests/
        env:
          DATABASE_URL: postgresql+asyncpg://ai_sdr:ai_sdr@localhost:5432/ai_sdr_test
          REDIS_URL: redis://localhost:6379/0
          API_KEY: test-api-key

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true
